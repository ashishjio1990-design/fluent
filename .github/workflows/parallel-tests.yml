name: Dynamic Parallel Tests

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Comma-separated test tags (e.g. smoke,regression,regression1)'
        required: true
        default: 'smoke,regression'
      parallel:
        description: 'Max parallel runners (1-5)'
        required: true
        default: '5'
        type: choice
        options: ['1','2','3','4','5']

jobs:
  setup:
    name: "Build Tag Matrix"
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - name: Parse tags into matrix
        id: gen
        run: |
          TAGS="${{ inputs.tags }}"
          MATRIX=$(echo "$TAGS" | tr ',' '\n' | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//' | grep -v '^$' | jq -R '{tag: .}' | jq -sc '{include: .}')
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT

  test:
    name: "Tag: ${{ matrix.tag }}"
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
      fail-fast: false
      max-parallel: ${{ fromJSON(inputs.parallel) }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up JDK 26
        uses: actions/setup-java@v4
        with:
          java-version: '26'
          distribution: 'temurin'
          cache: maven

      - name: Run [${{ matrix.tag }}] tests
        run: mvn test -Dgroups="${{ matrix.tag }}" -DforkCount=0 -pl .
        continue-on-error: true

      - name: Write Allure environment properties
        if: always()
        run: |
          mkdir -p target/allure-results
          {
            echo "Tag=${{ matrix.tag }}"
            echo "Branch=${{ github.ref_name }}"
            echo "Run=#${{ github.run_number }}"
            echo "Triggered By=${{ github.actor }}"
          } > target/allure-results/environment.properties

      - name: Upload Allure results for [${{ matrix.tag }}]
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-${{ matrix.tag }}
          path: target/allure-results
          retention-days: 7

  report:
    name: "Generate Merged Allure Report"
    runs-on: ubuntu-latest
    needs: test
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Download all Allure results
        uses: actions/download-artifact@v4
        with:
          pattern: allure-results-*
          path: merged-allure-results
          merge-multiple: true

      - name: Generate merged Allure report
        run: |
          npm install -g allure-commandline --save-dev
          cp -r merged-allure-results target/allure-results
          allure generate target/allure-results -o allure-report --clean

      - name: Upload merged Allure report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report-merged
          path: allure-report/
          retention-days: 14
