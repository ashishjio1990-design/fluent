name: Regression Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  regression:
    name: Run @regression tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '26'

      - name: Enable KVM for emulator acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Appium and UiAutomator2 driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      - name: Run regression tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        timeout-minutes: 45
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            mkdir -p target/allure-results
            appium --log target/appium.log &
            APPIUM_PID=$!
            sleep 5
            mvn test -Dgroups=regression -P ci -Dno.reset=false -Dfull.reset=true
            TEST_EXIT=$?
            kill $APPIUM_PID 2>/dev/null || true
            exit $TEST_EXIT

      - name: Write Allure environment properties
        if: always()
        run: |
          mkdir -p target/allure-results
          {
            echo "Branch=${{ github.ref_name }}"
            echo "Run=#${{ github.run_number }}"
            echo "Triggered By=${{ github.actor }}"
            echo "Platform=Android API 34"
          } > target/allure-results/environment.properties

      - name: Generate Allure report
        if: always()
        run: |
          npm install -g allure-commandline@2.27.0
          allure generate target/allure-results -o allure-report --clean

      - name: Upload Allure HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/

      - name: Upload Appium logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-logs
          path: target/appium.log
