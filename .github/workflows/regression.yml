name: Regression Tests

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  regression:
    name: Run @regression tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '26'

      - name: Enable KVM for emulator acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Install Appium and UiAutomator2 driver
        run: |
          npm install -g appium
          appium driver install uiautomator2

      # continue-on-error lets the job proceed to the artifact/report steps
      # regardless of test outcome. The explicit "Fail job" step below restores
      # the correct exit signal at the end.
      - name: Run regression tests on emulator
        id: run-tests
        continue-on-error: true
        uses: reactivecircus/android-emulator-runner@v2
        timeout-minutes: 45
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim
          disable-animations: true
          script: |
            mkdir -p target
            appium --log target/appium.log &
            APPIUM_PID=$!
            sleep 5
            mvn test -Dgroups=regression -P ci -Dno.reset=false -Dfull.reset=true
            TEST_EXIT=$?

            # ── Cleanup: kill Appium ──────────────────────────────────────────
            kill $APPIUM_PID 2>/dev/null || true

            exit $TEST_EXIT

      - name: Upload Appium logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-logs
          path: target/appium.log
          if-no-files-found: warn

      - name: Upload Surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: target/surefire-reports/
          if-no-files-found: warn

      # Restore the correct job outcome — fail the job when tests failed.
      - name: Fail job if tests failed
        if: steps.run-tests.outcome == 'failure'
        run: |
          echo "::error::Regression tests failed — check the surefire-reports artifact for details"
          exit 1
