name: Fluent Android — Mobile Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  # Webhook / API trigger support
  workflow_dispatch:
    inputs:
      platform:
        description: 'Target platform'
        required: false
        default: 'android'
      test_filter:
        description: 'Test filter (e.g. RegistrationTest)'
        required: false
        default: ''

jobs:
  android-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Enable KVM (hardware acceleration for emulator)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install emulator and system image
        run: |
          sdkmanager --install \
            "emulator" \
            "platform-tools" \
            "system-images;android-34;google_apis;x86_64" \
            "platforms;android-34"
          echo "no" | avdmanager create avd \
            --name "CI_AVD" \
            --package "system-images;android-34;google_apis;x86_64" \
            --device "pixel_6" \
            --force

      - name: Start emulator
        run: |
          $ANDROID_HOME/emulator/emulator \
            -avd CI_AVD \
            -no-window -no-audio -no-boot-anim \
            -gpu swiftshader_indirect &
          adb wait-for-device
          # Wait until boot is complete
          until [ "$(adb shell getprop sys.boot_completed 2>/dev/null)" = "1" ]; do
            sleep 5
          done
          echo "Emulator ready"

      - name: Install APK
        run: adb install -r apps/android/fluent-health.apk

      - name: Set up Node.js and Appium
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Appium and UiAutomator2 driver
        run: |
          npm install -g appium@latest
          appium driver install uiautomator2

      - name: Start Appium server
        run: |
          appium --log appium.log --log-level info &
          # Wait for Appium to be ready
          until curl -sf http://127.0.0.1:4723/status > /dev/null; do
            sleep 2
          done
          echo "Appium server ready"

      - name: Run tests
        run: |
          TEST_FILTER="${{ github.event.inputs.test_filter }}"
          if [ -n "$TEST_FILTER" ]; then
            mvn test -Pci -Dplatform=android \
              -Dtest="$TEST_FILTER" \
              -Dsurefire.failIfNoSpecifiedTests=false
          else
            mvn test -Pci -Dplatform=android
          fi

      - name: Upload Allure results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results/

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: screenshots/

      - name: Upload Appium log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: appium-log
          path: appium.log
